version: "3.8"

services:
  openhive-e2e:
    build:
      context: ../../../..
      dockerfile: deployments/Dockerfile
    environment:
      - OPENHIVE_DATA_DIR=/data
      - OPENHIVE_RUN_DIR=/app/.run
      - OPENHIVE_SYSTEM_RULES_DIR=/app/system-rules
      - OPENHIVE_LISTEN_ADDRESS=0.0.0.0
      - OPENHIVE_LISTEN_PORT=8080
      - OPENHIVE_ENABLE_API_MESSAGE=true
      - OPENHIVE_LOG_LEVEL=debug
    volumes:
      - ./e2e-config:/data/config:ro
      - ./e2e-rules:/data/rules
      - e2e-run:/app/.run
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5

volumes:
  e2e-run:
