# =============================================================================
# OpenHive v2 Docker Compose -- AC17
# Network: ICC disabled for container isolation
# No privileged mode, no host networking
# =============================================================================

services:
  openhive:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: openhive:latest
    ports:
      - "8080:8080"
    volumes:
      - ../.run/workspace:/app/workspace
      - ../data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    environment:
      OPENHIVE_IS_ROOT: "true"
      OPENHIVE_SYSTEM_LISTEN_ADDRESS: "0.0.0.0"
    networks:
      - openhive-network
    stdin_open: true
    tty: true

networks:
  openhive-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
