version: "3.8"

services:
  openhive:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      - OPENHIVE_DATA_DIR=/data
      - OPENHIVE_RUN_DIR=/app/.run
      - OPENHIVE_SYSTEM_RULES_DIR=/app/system-rules
      - OPENHIVE_LISTEN_ADDRESS=0.0.0.0
    volumes:
      - ../data/config:/data/config:ro    # Admin config (read-only)
      - ../data/rules:/data/rules         # Org rules (writable, seeded)
      - openhive-run:/app/.run            # Runtime workspace (persistent)
    ports:
      - "8080:8080"

volumes:
  openhive-run:
