version: "3.8"

services:
  openhive:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      - OPENHIVE_LOG_LEVEL=info
    volumes:
      - ../data/config:/data/config:ro    # Admin config (read-only)
      - ../data/rules:/data/rules         # Org rules (writable, seeded)
      - openhive-run:/app/.run            # Runtime workspace (persistent)
    ports:
      - "8080:8080"

volumes:
  openhive-run:
