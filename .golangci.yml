run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: internal/mocks/
      linters:
        - govet
        - errcheck
        - staticcheck
        - unused
        - gosimple
        - ineffassign
