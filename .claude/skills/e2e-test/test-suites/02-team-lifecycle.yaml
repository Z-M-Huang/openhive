name: Team Lifecycle
description: Verify team creation flow through CLI -- create a weather team, confirm creation, and verify child container is spawned.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Request weather team creation
    description: Send a natural-language request to create a weather team and verify the assistant confirms it
    steps:
      - action: "Send a team creation request through the CLI and capture the response"
        command: "echo 'Create a team that can report the current temperature and weather with a given city' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "The assistant acknowledges the request and confirms that a weather team has been created (response mentions team creation, weather, or similar confirmation)"

  - name: Verify team exists via REST API
    description: Confirm the team was persisted by querying the teams API endpoint
    steps:
      - action: "Query the teams API to list all teams"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "team"
    expected_outcome: "The API returns a JSON response containing at least one team entry related to weather"

  - name: Verify child container was spawned
    description: Confirm a new Docker container was created for the team members
    steps:
      - action: "Query the containers API to see running containers"
        command: "curl -sf http://localhost:8080/api/containers 2>&1"
        expected: "container"
    expected_outcome: "The containers list shows at least one child container besides the root, indicating the team's member container was spawned (INV-05)"
