name: Container Restart via API
description: Verify the internal container restart path — create a team, restart its container via REST API, verify recovery and system health.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait for health"

teardown:
  - command: "curl -sf -X DELETE http://localhost:8080/api/teams/resilience-test 2>&1 || true"
    description: "Remove test team"
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up"

test_cases:
  - name: Create team with container
    description: Create a team that spawns a container
    steps:
      - action: "Create resilience-test team via API"
        command: "curl -sf -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\":\"resilience-test\",\"leader_aid\":\"aid-main-001\"}' 2>&1"
        expected: "resilience-test"
      - action: "Wait for container to start"
        command: "sleep 5"
      - action: "Verify team exists"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "resilience-test"
      - action: "Verify container running"
        command: "curl -sf http://localhost:8080/api/containers 2>&1"
        expected: "resilience-test"
    expected_outcome: "Team created with a running container"

  - name: Restart container and verify recovery
    description: Use the REST API to restart the team's container and verify the system recovers
    steps:
      - action: "Trigger container restart via API"
        command: "curl -sf -X POST http://localhost:8080/api/containers/resilience-test/restart -H 'Content-Type: application/json' -d '{\"reason\":\"e2e-test\"}' 2>&1"
        expected: "restart"
      - action: "Wait for container to recover"
        command: "for i in $(seq 1 12); do curl -sf http://localhost:8080/api/containers 2>&1 | grep -q 'resilience-test' && echo 'Container recovered' && exit 0; sleep 5; done; echo 'Recovery timeout'; exit 1"
        expected: "Container recovered"
      - action: "Verify system health still OK"
        command: "curl -sf http://localhost:8080/api/health 2>&1"
        expected: "\"status\":\"healthy\""
    expected_outcome: "Container restarts successfully, system remains healthy"
