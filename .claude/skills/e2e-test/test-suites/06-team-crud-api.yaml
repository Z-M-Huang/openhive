name: Team CRUD
description: Verify team lifecycle via REST API: create with valid slug, list teams, get team details, delete team, reject invalid slugs, and reject reserved slugs.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Create team with valid slug via REST API
    description: POST /api/teams with valid slug creates team and returns 201 with slug, containerId, status
    steps:
      - action: "Create team via REST API POST and verify slug in response"
        command: "curl -sf -w '\\n%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"crud-test-team\", \"purpose\": \"Team CRUD test\"}' 2>&1"
        expected: "\"slug\":\"crud-test-team\""
    expected_outcome: "201 Created with {slug: 'crud-test-team', containerId: '...', status: 'created'}"

  - name: List all teams via GET /api/teams
    description: GET /api/teams returns array of teams with tid, slug, leaderAid, health, agentCount, depth, parentSlug
    steps:
      - action: "Query teams list"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "crud-test-team"
    expected_outcome: "Teams list includes crud-test-team with summary fields (slug, leaderAid, health, agentCount, depth)"

  - name: Get team details via GET /api/teams/:slug
    description: GET /api/teams/:slug returns detailed team with tid, slug, leaderAid, health, depth, containerId, agents, childTeams
    steps:
      - action: "Query team details and verify slug value"
        command: "curl -sf http://localhost:8080/api/teams/crud-test-team 2>&1"
        expected: "\"slug\":\"crud-test-team\""
      - action: "Verify childTeams array present in detail response"
        command: "curl -sf http://localhost:8080/api/teams/crud-test-team 2>&1"
        expected: "\"childTeams\":["
    expected_outcome: "Team detail response includes slug, tid, leaderAid, health, depth, containerId, agents array, childTeams array"

  - name: Delete team via DELETE /api/teams/:slug
    description: DELETE /api/teams/:slug removes team and returns {slug, status: 'removed'}
    steps:
      - action: "Delete the test team and verify slug and status in response"
        command: "curl -sf -X DELETE http://localhost:8080/api/teams/crud-test-team 2>&1"
        expected: "\"status\":\"removed\""
      - action: "Verify team is gone (404)"
        command: "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/api/teams/crud-test-team 2>&1"
        expected: "404"
    expected_outcome: "Team deleted successfully, subsequent GET returns 404"

  - name: Reject invalid slug format
    description: POST /api/teams with invalid slug (uppercase, too short, special chars) returns 400
    steps:
      - action: "Attempt to create team with uppercase slug"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"Invalid-Slug\"}' 2>&1"
        expected: "400"
      - action: "Attempt to create team with too-short slug"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"ab\"}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request for slugs that violate SLUG_REGEX (^[a-z0-9]+(-[a-z0-9]+)*$, 3-63 chars)"

  - name: Reject reserved slugs
    description: POST /api/teams with reserved slug (main, admin, system, root, openhive) returns 400
    steps:
      - action: "Attempt to create team with reserved slug 'admin'"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"admin\"}' 2>&1"
        expected: "400"
      - action: "Attempt to create team with reserved slug 'system'"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"system\"}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request for reserved slugs (main, admin, system, root, openhive)"
