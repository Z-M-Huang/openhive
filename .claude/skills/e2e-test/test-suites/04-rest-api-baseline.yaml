name: REST API Baseline
description: Verify REST API baseline endpoints return correct responses on a fresh system.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Health check returns status and uptime
    description: Verify GET /api/health returns JSON with status, uptime, containers, connectedTeams, dbStatus
    steps:
      - action: "Verify status is healthy"
        command: "curl -sf http://localhost:8080/api/health 2>&1"
        expected: "\"status\":\"healthy\""
      - action: "Verify dbStatus is connected"
        command: "curl -sf http://localhost:8080/api/health 2>&1"
        expected: "\"dbStatus\":\"connected\""
    expected_outcome: "Health endpoint returns healthy status with connected database"

  - name: Teams list contains main team
    description: Verify GET /api/teams returns the default main team
    steps:
      - action: "Query teams endpoint and verify main team exists"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "\"slug\":\"main\""
    expected_outcome: "Teams endpoint returns the main team"

  - name: Tasks endpoint responds
    description: Verify GET /api/tasks returns a tasks array
    steps:
      - action: "Query tasks endpoint"
        command: "curl -sf http://localhost:8080/api/tasks 2>&1"
        expected: "\"tasks\":"
    expected_outcome: "Tasks endpoint returns JSON with tasks array"

  - name: Containers endpoint responds
    description: Verify GET /api/containers returns container array
    steps:
      - action: "Query containers endpoint"
        command: "curl -sf http://localhost:8080/api/containers 2>&1"
        expected: "\"containers\":"
    expected_outcome: "Containers endpoint returns JSON with containers array"

  - name: Settings endpoint returns config with source metadata
    description: Verify GET /api/settings returns nested config with per-field value and source tracking
    steps:
      - action: "Query settings endpoint"
        command: "curl -sf http://localhost:8080/api/settings 2>&1"
        expected: "\"source\""
    expected_outcome: "Settings endpoint returns nested JSON with value and source per field"
