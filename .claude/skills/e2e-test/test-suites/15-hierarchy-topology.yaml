name: Hierarchy and Topology
description: Verify org chart structure and team hierarchy -- inspect_topology returns nested tree, parent-child team relationships tracked via parentSlug, team depth correctly computed, GET /api/teams/:slug includes childTeams array.

setup:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && bun run docker 2>&1 &"
    description: "Build the Docker image and start the server in the background"
  - command: "for i in $(seq 1 60); do curl -sf http://localhost:8080/api/health && exit 0; sleep 5; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 5 minutes for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Build multi-level hierarchy and inspect topology
    description: Create nested teams (parent -> child -> grandchild) and verify topology via CLI
    steps:
      - action: "Create multi-level team hierarchy via CLI"
        command: "echo 'Create a parent team called level-one, then create a child team called level-two under level-one, then create level-three under level-two' | timeout 400 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Inspect topology via CLI"
        command: "echo 'Show the complete team topology and hierarchy' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Topology shows nested tree: level-one -> level-two -> level-three with proper depth values"

  - name: Verify parent-child relationships via parentSlug in /api/teams
    description: GET /api/teams returns parentSlug for each team, confirming parent-child links
    steps:
      - action: "Get all teams and verify level-two has parentSlug level-one"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "\"parentSlug\":\"level-one\""
    expected_outcome: "Teams list shows parent-child relationships: level-two has parentSlug 'level-one', level-three has parentSlug 'level-two'"

  - name: Verify depth tracking
    description: Team depth is correctly computed (root children at depth 1, grandchildren at 2, etc.)
    steps:
      - action: "Query level-two detail and verify parentSlug is level-one"
        command: "curl -sf http://localhost:8080/api/teams/level-two 2>&1"
        expected: "\"slug\":\"level-two\""
    expected_outcome: "Teams show correct depth values increasing with nesting level"

  - name: GET /api/teams/:slug includes childTeams array
    description: Team detail response at /api/teams/:slug includes childTeams array with child team slugs
    steps:
      - action: "Query team detail for level-one and verify childTeams contains level-two"
        command: "curl -sf http://localhost:8080/api/teams/level-one 2>&1"
        expected: "\"childTeams\":[\"level-two\"]"
      - action: "Query team detail for level-two and verify childTeams contains level-three"
        command: "curl -sf http://localhost:8080/api/teams/level-two 2>&1"
        expected: "\"childTeams\":[\"level-three\"]"
    expected_outcome: "GET /api/teams/level-one returns childTeams containing 'level-two'. GET /api/teams/level-two returns childTeams containing 'level-three'."

  - name: Leaf team has empty childTeams
    description: A leaf team (no children) returns an empty childTeams array in /api/teams/:slug
    steps:
      - action: "Query team detail for leaf team level-three and verify empty childTeams"
        command: "curl -sf http://localhost:8080/api/teams/level-three 2>&1"
        expected: "\"childTeams\":[]"
    expected_outcome: "GET /api/teams/level-three returns childTeams as an empty array, confirming it is a leaf node in the hierarchy"
