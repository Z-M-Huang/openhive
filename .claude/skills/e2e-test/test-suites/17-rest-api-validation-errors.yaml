name: REST API Validation Errors
description: Verify REST API returns correct error responses -- 400 Bad Request for invalid slug format (uppercase, too short, too long), 400 for reserved slugs (main, admin, system, root, openhive), 404 Not Found for non-existent team/task, 400 for missing required fields, 400 for malformed JSON body.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: 400 for invalid slug format (uppercase)
    description: POST /api/teams with uppercase slug returns 400 Bad Request
    steps:
      - action: "Send POST with uppercase slug"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"InvalidSlug\"}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request because slug contains uppercase letters (violates SLUG_REGEX)"

  - name: 400 for slug too short
    description: POST /api/teams with 2-char slug returns 400 (minimum 3 chars)
    steps:
      - action: "Send POST with too-short slug"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"ab\"}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request because slug is shorter than 3 characters"

  - name: 400 for reserved slug
    description: POST /api/teams with reserved slug 'admin' or 'system' returns 400
    steps:
      - action: "Send POST with reserved slug 'admin'"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"admin\"}' 2>&1"
        expected: "400"
      - action: "Send POST with reserved slug 'system'"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"system\"}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request for reserved slugs (main, admin, system, root, openhive)"

  - name: 404 for non-existent team
    description: GET /api/teams/:slug for a non-existent team returns 404
    steps:
      - action: "Query non-existent team"
        command: "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/api/teams/nonexistent-team-xyz 2>&1"
        expected: "404"
    expected_outcome: "404 Not Found with error message 'Team not found: nonexistent-team-xyz'"

  - name: 404 for non-existent task
    description: GET /api/tasks/:id for a non-existent task returns 404
    steps:
      - action: "Query non-existent task"
        command: "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/api/tasks/task-nonexistent-xyz 2>&1"
        expected: "404"
    expected_outcome: "404 Not Found with error message 'Task not found: task-nonexistent-xyz'"

  - name: 400 for slug too long
    description: POST /api/teams with 64-char slug returns 400 (maximum 63 chars)
    steps:
      - action: "Send POST with too-long slug (64 chars)"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijkl\"}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request because slug exceeds 63 character maximum"

  - name: 400 for missing required fields and invalid JSON
    description: POST /api/tasks without team_slug returns 400; malformed JSON returns 400
    steps:
      - action: "Send POST with missing required field team_slug and verify 400 status"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/tasks -H 'Content-Type: application/json' -d '{\"title\": \"Missing team\", \"prompt\": \"Test\"}' 2>&1"
        expected: "400"
      - action: "Send POST with missing required field and verify error in body"
        command: "curl -sf -X POST http://localhost:8080/api/tasks -H 'Content-Type: application/json' -d '{\"title\": \"Missing team\", \"prompt\": \"Test\"}' 2>&1 || true"
        expected: "error"
      - action: "Send POST with malformed JSON"
        command: "curl -sf -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{invalid json}' 2>&1"
        expected: "400"
    expected_outcome: "400 Bad Request for missing required fields and malformed JSON body"
