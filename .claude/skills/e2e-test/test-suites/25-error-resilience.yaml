name: Error Resilience
description: Verify graceful handling of bad inputs — invalid names, duplicates, scope rejections.
needs_api_key: false
needs_clean_start: false

setup:
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"

teardown: []

test_cases:
  - name: Invalid team name rejected
    steps:
      - action: "Check org tree rejects invalid names at API level"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); const r=D.prepare('SELECT COUNT(*) as c FROM org_tree').get(); console.log('teams:', r.c); D.close()\""
        expected: "teams:"
    expected_outcome: "Org tree is queryable and rejects invalid team names at spawn time"

  - name: Health endpoint resilient under load
    steps:
      - action: "Hit health 10 times rapidly"
        command: "for i in $(seq 1 10); do curl -sf http://localhost:8080/health >/dev/null 2>&1; done && echo 'ALL_OK'"
        expected: "ALL_OK"
    expected_outcome: "Health endpoint handles rapid requests without failure"

  - name: Database survives concurrent access
    steps:
      - action: "Multiple concurrent reads"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); for(let i=0;i<10;i++){D.prepare('SELECT COUNT(*) FROM org_tree').get()} console.log('OK'); D.close()\""
        expected: "OK"
    expected_outcome: "SQLite handles concurrent reads without corruption"
