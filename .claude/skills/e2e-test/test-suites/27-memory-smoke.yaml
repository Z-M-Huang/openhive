name: Memory Smoke Tests
description: End-to-end smoke tests verifying the complete memory system works: save, recall, cross-session persistence, and multi-message context.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "rm -rf /app/openhive/.run/workspace/memory 2>/dev/null; mkdir -p /app/openhive/.run/workspace"
    description: "Clear any stale memory files"
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml up -d --build 2>&1 &"
    description: "Build and start the server"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait for health check (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Save creates MEMORY.md on disk
    description: Calling save_memory creates a MEMORY.md file in the agent's memory directory
    steps:
      - action: "Save a curated memory entry"
        command: "echo 'Save this as curated memory: The API rate limit is 1000 requests per minute' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify MEMORY.md file was created on disk"
        command: "sleep 3 && find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -5"
        expected: "MEMORY.md"
      - action: "Verify file contains the saved content"
        command: "cat $(find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -1) 2>&1"
        expected: "rate limit"
    expected_outcome: "MEMORY.md file exists on disk under the agent's memory directory and contains the saved content about API rate limits"

  - name: Append preserves prior entries
    description: Saving a second memory entry preserves the first -- both are present in MEMORY.md
    steps:
      - action: "Save first memory entry"
        command: "echo 'Save this as curated memory: Database backups run at 2am UTC daily' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Save second memory entry"
        command: "echo 'Save this as curated memory: Redis cache TTL is set to 3600 seconds' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify both entries exist in the memory file"
        command: "cat $(find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -1) 2>&1"
        expected: "backup"
    expected_outcome: "MEMORY.md contains both the database backup entry and the Redis cache entry, confirming append does not overwrite prior content"

  - name: Cross-session recall from MEMORY.md
    description: Save a fact, disconnect, reconnect in a new session, and verify the assistant recalls the fact from MEMORY.md
    steps:
      - action: "Save a distinctive fact"
        command: "echo 'Save this as curated memory: The deployment SSH key fingerprint is SHA256:abc123def456' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Disconnect, wait, then reconnect and ask about the saved fact"
        command: "sleep 5 && echo 'What is the deployment SSH key fingerprint?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "abc123def456"
    expected_outcome: "After reconnecting in a new session, the assistant retrieves the SSH key fingerprint from MEMORY.md injection, proving cross-session persistence"

  - name: Multi-message conversation maintains context
    description: Send 4+ messages in a single session and verify the assistant references information from earlier messages
    steps:
      - action: "Send a multi-turn conversation via WebSocket and verify context is maintained across messages"
        command: "timeout 120 bun -e \"
          const ws = new WebSocket('ws://localhost:8080/ws/cli');
          let responses = [];
          const messages = [
            'My company name is Nextera Systems.',
            'We have 150 employees across 3 offices.',
            'Our main product is called CloudBridge.',
            'Summarize everything you know about my company so far.'
          ];
          ws.onopen = () => {
            ws.send(JSON.stringify({type:'message',content:messages[0]}));
          };
          ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'response') {
              responses.push(d.content);
              if (responses.length < messages.length) {
                setTimeout(() => ws.send(JSON.stringify({type:'message',content:messages[responses.length]})), 2000);
              } else {
                console.log('[Final Response]', responses[responses.length - 1].substring(0, 500));
                ws.close(); process.exit(0);
              }
            }
          };
          ws.onerror = () => process.exit(1);
          setTimeout(() => { console.log('TIMEOUT'); process.exit(1); }, 110000);
        \" 2>&1"
        expected: "Nextera"
    expected_outcome: "The final summary response references Nextera Systems, 150 employees, 3 offices, and CloudBridge -- proving the assistant maintained context across all 4 messages"

  - name: recall_memory returns saved content
    description: Use recall_memory explicitly to verify it returns previously saved content
    steps:
      - action: "Save a memory with a unique keyword"
        command: "echo 'Save this as curated memory: The Prometheus monitoring endpoint is exposed on port 9090' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Recall the memory by keyword"
        command: "echo 'Use recall_memory to find any memories about Prometheus monitoring' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "9090"
    expected_outcome: "recall_memory returns the saved entry about Prometheus on port 9090, confirming the recall tool retrieves previously saved content"
