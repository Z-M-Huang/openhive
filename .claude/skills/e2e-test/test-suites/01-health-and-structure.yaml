name: Health & Infrastructure
description: Verify container starts, health returns 200, .run/ structure created, seed rules applied.
needs_api_key: false
needs_clean_start: true

setup:
  - command: "sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start"
  - command: "sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start container"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Wait for health"

teardown:
  - command: "sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"

test_cases:
  - name: Health returns 200 with storage OK
    steps:
      - action: "Check health endpoint"
        command: "curl -sf http://localhost:8080/health"
        expected: "storage.*ok.*true"
    expected_outcome: "GET /health returns 200 with storage.ok=true"

  - name: Runtime directories exist
    steps:
      - action: "Check .run/ structure"
        command: "sudo docker exec deployments-openhive-1 ls /app/.run/teams /app/.run/shared /app/.run/backups"
        expected: "teams"
    expected_outcome: "teams/, shared/, backups/ directories exist"

  - name: Main team scaffolded
    steps:
      - action: "Check main team config"
        command: "sudo docker exec deployments-openhive-1 cat /app/.run/teams/main/config.yaml"
        expected: "name: main"
    expected_outcome: "Main team has config.yaml with name: main"

  - name: Seed rules applied
    steps:
      - action: "Check seed rules in /data/rules/"
        command: "sudo docker exec deployments-openhive-1 ls /data/rules/"
        expected: ".md"
    expected_outcome: "Seed .md files present in /data/rules/"

  - name: Health JSON has all fields
    steps:
      - action: "Check health fields"
        command: "curl -sf http://localhost:8080/health | python3 -c 'import json,sys; d=json.load(sys.stdin); assert \"storage\" in d and \"sessions\" in d and \"triggers\" in d and \"channels\" in d; print(\"OK\")'"
        expected: "OK"
    expected_outcome: "Health JSON has storage, sessions, triggers, channels fields"

  - name: Container reports healthy
    steps:
      - action: "Check Docker health status"
        command: "sudo docker inspect --format='{{.State.Health.Status}}' deployments-openhive-1"
        expected: "healthy"
    expected_outcome: "Docker reports container as healthy"
