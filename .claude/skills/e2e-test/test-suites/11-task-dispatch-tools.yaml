name: Task Dispatch Tools
description: Verify create_task, dispatch_subtask, and update_task_status MCP tools -- create a top-level task, dispatch subtasks with parent linkage, update task status through valid transitions, verify blocked_by dependency handling, and confirm task events are recorded.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"
  - command: "echo 'Create a team called dispatch-test for testing task dispatch operations' | timeout 300 bun run cli/index.ts 2>&1"
    description: "Create a team via CLI to provide task context for dispatch tests"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Create top-level task via CLI
    description: create_task MCP tool creates a task assigned to an agent
    steps:
      - action: "Create task via CLI"
        command: "echo 'Create a task for the dispatch-test team to analyze sales data' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify task appears in API"
        command: "curl -sf http://localhost:8080/api/tasks 2>&1"
        expected: "task"
    expected_outcome: "Task created and visible in tasks API with team_slug set"

  - name: Dispatch subtask with parent linkage
    description: dispatch_subtask creates child task linked to parent_task_id
    steps:
      - action: "Dispatch subtask via CLI"
        command: "echo 'Create a subtask to filter the data as part of the sales analysis' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify parent-child linkage in tasks API"
        command: "curl -sf http://localhost:8080/api/tasks 2>&1"
        expected: "parent"
    expected_outcome: "Subtask created with parent_id linking to the parent task"

  - name: Update task status to active
    description: update_task_status transitions task from pending to active
    steps:
      - action: "Update task status via CLI"
        command: "echo 'Update the sales analysis task status to active' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify status changed"
        command: "curl -sf http://localhost:8080/api/tasks 2>&1"
        expected: "active"
    expected_outcome: "Task status updated from pending to active"

  - name: Complete task with result
    description: update_task_status transitions task from active to completed with result
    steps:
      - action: "Mark task as completed via CLI"
        command: "echo 'Mark the sales analysis task as completed with result: analysis complete' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify task completed"
        command: "curl -sf http://localhost:8080/api/tasks 2>&1"
        expected: "completed"
    expected_outcome: "Task status updated to completed with result field set"

  - name: Task with blocked_by dependencies
    description: Create task blocked by another task's completion
    steps:
      - action: "Create dependent task via CLI"
        command: "echo 'Create a task that is blocked by the sales analysis task' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Task created with blocked_by array referencing the dependency task ID"

  - name: Verify task events recorded
    description: Task lifecycle events are recorded and queryable via API
    steps:
      - action: "Query task events via REST API"
        command: "TASK_ID=$(curl -sf 'http://localhost:8080/api/tasks?limit=1' 2>&1 | grep -o '\"id\":\"[^\"]*\"' | head -1 | cut -d'\"' -f4); curl -sf http://localhost:8080/api/tasks/$TASK_ID/events 2>&1"
        expected: "events"
    expected_outcome: "Events endpoint returns state transition history for the task"
