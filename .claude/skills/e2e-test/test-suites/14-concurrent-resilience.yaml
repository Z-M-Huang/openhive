name: Concurrent & Error Resilience
description: Graceful error handling for malformed input and rapid-fire stress testing.
needs_api_key: true
needs_clean_start: false

setup:
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Wait for health"

teardown: []

test_cases:
  - name: Invalid JSON
    steps:
      - action: "Send non-JSON text via WebSocket"
        command: "echo 'not json' | timeout 10 websocat ws://localhost:8080/ws 2>&1"
        expected: "error"
    expected_outcome: "Server returns error response for invalid JSON"

  - name: Missing content field
    steps:
      - action: "Send JSON without content field"
        command: "echo '{\"foo\":\"bar\"}' | timeout 10 websocat ws://localhost:8080/ws 2>&1"
        expected: "missing content|content"
    expected_outcome: "Server returns error about missing content"

  - name: Empty content
    steps:
      - action: "Send JSON with empty content"
        command: "echo '{\"content\":\"\"}' | timeout 10 websocat ws://localhost:8080/ws 2>&1"
        expected: "missing content|content"
    expected_outcome: "Server returns error about empty content"

  - name: Rapid-fire 3 messages
    steps:
      - action: "Send first rapid message"
        command: "echo '{\"content\":\"Say exactly: RAPID1\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1"
        expected: "content"
      - action: "Send second rapid message"
        command: "echo '{\"content\":\"Say exactly: RAPID2\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1"
        expected: "content"
      - action: "Send third rapid message"
        command: "echo '{\"content\":\"Say exactly: RAPID3\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1"
        expected: "content"
    expected_outcome: "All 3 messages receive non-error responses"

  - name: Health after stress
    steps:
      - action: "Verify health endpoint still OK"
        command: "curl -sf http://localhost:8080/health 2>&1"
        expected: "ok.*true|storage.*ok"
    expected_outcome: "System remains healthy after stress testing"
