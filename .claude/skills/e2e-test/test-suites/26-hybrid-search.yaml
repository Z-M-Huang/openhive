name: Hybrid Search
description: Verify recall_memory uses BM25/FTS5 search with graceful fallback and curated memories outranking daily ones.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "rm -rf /app/openhive/.run/workspace/memory 2>/dev/null; mkdir -p /app/openhive/.run/workspace"
    description: "Clear any stale memory files"
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml up -d --build 2>&1 &"
    description: "Build and start the server"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait for health check (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: BM25 keyword retrieval
    description: Save memories with distinct keywords and recall by keyword to verify BM25/FTS5 indexing
    steps:
      - action: "Save a curated memory with a unique keyword"
        command: "echo 'Save this as curated memory: The Zephyr project launches on April 15th with a budget of 50000 dollars' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Save a second memory with a different keyword"
        command: "echo 'Save this as curated memory: The Avalon database migration is scheduled for May 3rd' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Recall by the first keyword"
        command: "echo 'Recall any memories about Zephyr' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "Zephyr"
    expected_outcome: "recall_memory returns the Zephyr entry when queried by keyword, confirming BM25/FTS5 keyword matching works"

  - name: Graceful fallback without embeddings
    description: recall_memory still works via BM25/LIKE when no embedding model is configured
    steps:
      - action: "Save a memory with specific content"
        command: "echo 'Save this as curated memory: The quarterly review meeting is every second Tuesday' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Recall using a related keyword"
        command: "echo 'Recall memories about quarterly review' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "quarterly"
    expected_outcome: "recall_memory returns results via BM25/LIKE fallback even without embedding-based vector search, no errors about missing embeddings"

  - name: Curated outranks daily
    description: Save both curated and daily memories on the same topic and verify curated is ranked higher in recall results
    steps:
      - action: "Save a daily memory about server config"
        command: "echo 'Record as daily memory: Server config uses port 3000 for development' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Save a curated memory about server config"
        command: "echo 'Save this as important curated memory: Production server config uses port 8443 with TLS enabled' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Recall memories about server config"
        command: "echo 'Recall all memories about server config' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "8443"
    expected_outcome: "The curated memory (port 8443 with TLS) appears first or is emphasized over the daily memory (port 3000), confirming curated outranks daily in search results"

  - name: Save-path and read-path alignment
    description: Save a memory, disconnect, reconnect, and verify the memory is available in context
    steps:
      - action: "Save a memory with distinctive content"
        command: "echo 'Save this as curated memory: The encryption key rotation schedule is every 90 days starting January 1st' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify memory file exists on disk"
        command: "sleep 3 && find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -5"
        expected: "MEMORY.md"
      - action: "Disconnect and reconnect, then ask about the saved content"
        command: "sleep 3 && echo 'What do you know about encryption key rotation?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "90 days"
    expected_outcome: "After disconnect and reconnect, the assistant retrieves the saved memory about key rotation, confirming save-path writes to disk and read-path loads from disk correctly"
