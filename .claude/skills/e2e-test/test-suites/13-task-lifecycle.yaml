name: Task Lifecycle Verification
description: Track task through Pending to Completed via async delegate_task pipeline.
needs_api_key: true
needs_clean_start: false

setup:
  - command: "echo '{\"content\":\"Create a team called lifecycle-ops for lifecycle testing. It should accept lifecycle, test, and ping topics.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
    description: "Create lifecycle-ops team"

teardown:
  - command: "echo '{\"content\":\"Shut down the lifecycle-ops team.\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1 || true"
    description: "Shut down lifecycle-ops"

test_cases:
  - name: Delegate and verify completion
    steps:
      - action: "Delegate a task to lifecycle-ops"
        command: "echo '{\"content\":\"Delegate this task to lifecycle-ops: respond with the word LIFECYCLE_OK.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
        expected: "content"
      - action: "Wait for task processing"
        command: "sleep 30"
        expected: ""
      - action: "Check task status in SQLite"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3');const d=new D('/app/.run/openhive.db');const r=d.prepare('SELECT status FROM task_queue WHERE team_id=? ORDER BY created_at DESC LIMIT 1').get('lifecycle-ops');console.log(r?r.status:'none');d.close()\" 2>&1"
        expected: "completed"
    expected_outcome: "Delegated task reaches completed status"

  - name: Multiple tasks all process
    steps:
      - action: "Insert 3 tasks with different priorities"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3');const d=new D('/app/.run/openhive.db');d.prepare('INSERT INTO task_queue (id,team_id,task,priority,status,created_at) VALUES (?,?,?,?,?,?)').run('e2e-lifecycle-1','lifecycle-ops','critical ping','critical','pending',new Date().toISOString());d.prepare('INSERT INTO task_queue (id,team_id,task,priority,status,created_at) VALUES (?,?,?,?,?,?)').run('e2e-lifecycle-2','lifecycle-ops','normal ping','normal','pending',new Date().toISOString());d.prepare('INSERT INTO task_queue (id,team_id,task,priority,status,created_at) VALUES (?,?,?,?,?,?)').run('e2e-lifecycle-3','lifecycle-ops','low ping','low','pending',new Date().toISOString());console.log('inserted');d.close()\" 2>&1"
        expected: "inserted"
      - action: "Wait for task processing"
        command: "sleep 150"
        expected: ""
      - action: "Check all 3 tasks completed"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3');const d=new D('/app/.run/openhive.db');const r=d.prepare(\\\"SELECT COUNT(*) as c FROM task_queue WHERE id LIKE 'e2e-lifecycle%' AND status='completed'\\\").get();console.log('completed:'+r.c);d.close()\" 2>&1"
        expected: "completed:3"
    expected_outcome: "All 3 tasks with different priorities reach completed status"
