name: Escalation
description: Verify escalation chain works — child team escalates to parent.
needs_api_key: true
needs_clean_start: false

setup:
  - command: "echo '{\"content\":\"Create a team called ops-team for operations tasks. It should accept deploy and ops topics.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
    description: "Create child team"

teardown:
  - command: "echo '{\"content\":\"Shut down ops-team.\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1"
    description: "Clean up team"

test_cases:
  - name: Escalation creates correlation record
    steps:
      - action: "Ask main to delegate and then escalate"
        command: "echo '{\"content\":\"Delegate a task to ops-team asking it to escalate a test issue back to you.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
        expected: "content"
      - action: "Check escalation records in SQLite (wait for processing)"
        command: "sleep 10 && sudo docker exec openhive-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); const r=D.prepare('SELECT COUNT(*) as c FROM escalation_correlations').get(); console.log('escalations:',r.c); D.close()\""
        expected: "escalations:"
    expected_outcome: "Escalation correlation record exists in database"
