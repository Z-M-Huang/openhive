name: Governance & Workspace Boundaries
description: Verify teams can only access their own directories. Unauthorized access blocked.
needs_api_key: false
needs_clean_start: false

setup:
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Wait for health"

teardown: []

test_cases:
  - name: Team workspace boundary enforced
    steps:
      - action: "Verify workspace boundary includes correct dirs"
        command: "sudo docker exec deployments-openhive-1 node -e \"const {buildSessionContext}=require('./backend/dist/sessions/context-builder.js'); const ctx=buildSessionContext('main','/app/.run'); console.log('cwd:', ctx.cwd); console.log('dirs:', ctx.additionalDirectories.length)\""
        expected: "workspace"
    expected_outcome: "Session context has workspace as cwd and 5 additional directories"

  - name: Team directories are properly scaffolded
    steps:
      - action: "Verify main team has all required subdirectories"
        command: "sudo docker exec deployments-openhive-1 sh -c 'for d in workspace memory org-rules team-rules skills subagents; do test -d /app/.run/teams/main/$d && echo \"$d:OK\" || echo \"$d:MISSING\"; done'"
        expected: "workspace:OK"
    expected_outcome: "All 6 subdirectories exist for main team"
