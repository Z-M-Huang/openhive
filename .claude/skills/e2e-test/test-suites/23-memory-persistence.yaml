name: Memory Persistence
description: Verify the assistant remembers facts across messages (same session) and across sessions (MEMORY.md + task history injection).

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes"
  - command: "rm -rf /app/openhive/.run/workspace/memory 2>/dev/null; mkdir -p /app/openhive/.run/workspace"
    description: "Clear any stale memory files"
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml up -d --build 2>&1 &"
    description: "Build and start the server"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait for health check (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up"

test_cases:
  - name: Same-session memory (Tier 1)
    description: Within a single CLI session, the assistant should remember what was said earlier without needing save_memory. This tests SDK session continuity.
    steps:
      - action: "Send two messages in one CLI session -- first introduce yourself, then ask the assistant to recall. Use a script that sends both messages over the same WebSocket connection."
        command: "timeout 120 bun -e \"
          const ws = new WebSocket('ws://localhost:8080/ws/cli');
          let responses = [];
          ws.onopen = () => {
            ws.send(JSON.stringify({type:'message',content:'Hello, my name is Mark. Remember that.'}));
          };
          ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'response') {
              responses.push(d.content);
              if (responses.length === 1) {
                setTimeout(() => ws.send(JSON.stringify({type:'message',content:'What is my name?'})), 2000);
              } else {
                console.log('[Response 1]', responses[0].substring(0,100));
                console.log('[Response 2]', responses[1].substring(0,100));
                ws.close(); process.exit(0);
              }
            }
          };
          ws.onerror = () => process.exit(1);
          setTimeout(() => { console.log('TIMEOUT'); process.exit(1); }, 110000);
        \" 2>&1"
        expected: "Mark"
    expected_outcome: "The second response mentions 'Mark' -- the assistant remembers from the same session without needing save_memory"

  - name: Cross-session memory via save_memory (Tier 2)
    description: Tell the assistant to remember a fact, disconnect, reconnect, and verify the fact is recalled from MEMORY.md.
    steps:
      - action: "Tell assistant to remember a specific fact using save_memory"
        command: "echo 'Remember this important fact: My favorite color is blue. Use the save_memory tool to store it permanently.' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Wait for memory file to be written, then reconnect and ask about the fact"
        command: "sleep 5 && echo 'What is my favorite color?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "blue"
    expected_outcome: "After reconnecting, the assistant knows the favorite color is blue -- retrieved from MEMORY.md injection"

  - name: MEMORY.md file exists on disk (Tier 2 verification)
    description: After save_memory is called, verify the MEMORY.md file was created in the workspace
    steps:
      - action: "Check for memory files in the workspace"
        command: "find /app/openhive/.run/workspace/memory -name 'MEMORY.md' -o -name '*.md' 2>/dev/null | head -5"
        expected: "MEMORY.md"
    expected_outcome: "At least one MEMORY.md file exists under .run/workspace/memory/<agent-aid>/"

  - name: History bridge injects only user-root tasks
    description: On reconnect, the history bridge should inject only user-initiated root-level tasks into context, not internal system tasks or sub-agent tasks.
    steps:
      - action: "Send a user message that triggers a visible task"
        command: "echo 'What are the top 3 programming languages for web development in 2026?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Disconnect, reconnect, and ask what was discussed"
        command: "sleep 3 && echo 'What did we discuss in our last conversation?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "programming"
    expected_outcome: "The assistant references the web development discussion (a user-root task) but does not surface internal orchestration details, system heartbeats, or sub-agent task metadata -- confirming history bridge filters to user-root tasks only"

  - name: Recent history context on reconnect (Tier 3)
    description: Send several messages, disconnect, reconnect, and ask about previous topics. The assistant should reference recent conversation from task history.
    steps:
      - action: "Send a message about a specific topic"
        command: "echo 'I am planning a trip to Japan next month. What should I know?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Reconnect and ask about recent conversation"
        command: "sleep 3 && echo 'What were we talking about earlier?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "Japan"
    expected_outcome: "The assistant references the Japan trip discussion from the prior session -- retrieved from task history injection"

  - name: Daily log injection on reconnect
    description: On reconnect, the assistant should have access to the daily log from today's session, providing continuity for recent interactions.
    steps:
      - action: "Save a daily memory entry"
        command: "echo 'Record as daily memory: Discussed deployment pipeline optimization with 3 stages' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Disconnect, reconnect, and ask about today's activities"
        command: "sleep 5 && echo 'What did we work on today?' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "deployment"
    expected_outcome: "The assistant references the deployment pipeline discussion from today's daily log, confirming daily log content is injected into context on reconnect"

  - name: Startup reconciliation re-indexes file memories
    description: After a full restart, the memory system should re-index MEMORY.md files from disk so that recall_memory works without re-saving.
    steps:
      - action: "Save a curated memory with a unique keyword"
        command: "echo 'Save this as curated memory: The Nexus artifact repository is hosted at nexus.internal.corp on port 8081' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify the memory file exists on disk before restart"
        command: "find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -3"
        expected: "MEMORY.md"
      - action: "Restart the system"
        command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down 2>&1 && docker compose -f deployments/docker-compose.yml up -d 2>&1"
        expected: ""
      - action: "Wait for health check after restart"
        command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
        expected: "healthy"
      - action: "Recall the memory saved before restart"
        command: "echo 'Recall any memories about the Nexus artifact repository' | timeout 120 bun run cli/index.ts 2>&1"
        expected: "Nexus"
    expected_outcome: "After a full restart, recall_memory returns the Nexus repository entry that was saved before restart, confirming startup reconciliation re-indexes MEMORY.md files from disk"
