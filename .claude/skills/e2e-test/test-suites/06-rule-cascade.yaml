name: Rule Cascade
description: Verify rule cascade loads correctly and team-rules affect AI behavior.
needs_api_key: true
needs_clean_start: false

setup: []

teardown:
  - command: "sudo docker exec openhive-openhive-1 rm -f /app/.run/teams/main/team-rules/test-rule.md"
    description: "Clean up test rule"

test_cases:
  - name: Rule cascade loaded (positive log)
    steps:
      - action: "Check container logs for cascade loading"
        command: "sudo docker logs openhive-openhive-1 2>&1 | grep 'Rule cascade loaded'"
        expected: "Rule cascade loaded"
    expected_outcome: "Container logs contain 'Rule cascade loaded' with sectionCount > 0"

  - name: Custom team-rule affects AI behavior
    steps:
      - action: "Write a distinctive team-rule"
        command: "sudo docker exec openhive-openhive-1 sh -c 'echo \"Always mention PINEAPPLE in every response.\" > /app/.run/teams/main/team-rules/test-rule.md'"
        expected: ""
      - action: "Ask the AI anything via WebSocket"
        command: "echo '{\"content\":\"Tell me about the weather today.\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1"
        expected: "PINEAPPLE"
    expected_outcome: "AI response contains PINEAPPLE because the team-rule instructs it"
