name: Agent Workspace Placement
description: Verify that agent definitions are written to the team workspace (.claude/agents/), agents appear in team.yaml after create_agent, and agent definitions persist across container restart.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start"
  - command: "rm -rf /app/openhive/.run/workspace/teams 2>/dev/null; mkdir -p /app/openhive/.run/workspace"
    description: "Clear stale team workspaces"
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml up -d --build 2>&1 &"
    description: "Build and start the server"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait for health check"
  - command: "echo 'Create a team called placement-test and add a member agent named test-worker to it' | timeout 300 bun run cli/index.ts 2>&1"
    description: "Create test team with member via CLI"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up"

test_cases:
  - name: Agent definition written to team workspace
    description: After create_agent, the agent's .md definition file should exist in the team workspace (.claude/agents/)
    steps:
      - action: "Check for agent definition files in the team workspace"
        command: "find /app/openhive/.run/workspace/teams/placement-test/.claude/agents/ -name '*.md' 2>/dev/null | head -5"
        expected: ".md"
    expected_outcome: "At least one agent .md definition file found in teams/placement-test/.claude/agents/"

  - name: Agent appears in team.yaml
    description: After create_agent, the agent should be listed in the team's team.yaml configuration
    steps:
      - action: "Check team.yaml for agent entry"
        command: "cat /app/openhive/.run/workspace/teams/placement-test/team.yaml 2>&1"
        expected: "agent"
    expected_outcome: "team.yaml contains an entry for the created agent"

  - name: Agent definition persists across container restart
    description: After restarting the container, agent definition files should still exist on disk
    steps:
      - action: "Record agent files before restart"
        command: "find /app/openhive/.run/workspace/teams/placement-test/.claude/agents/ -name '*.md' 2>/dev/null | sort"
        expected: ".md"
      - action: "Restart the container"
        command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml restart 2>&1"
        expected: ""
      - action: "Wait for health check after restart"
        command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
        expected: "healthy"
      - action: "Verify agent files still exist after restart"
        command: "find /app/openhive/.run/workspace/teams/placement-test/.claude/agents/ -name '*.md' 2>/dev/null | head -5"
        expected: ".md"
    expected_outcome: "Agent definition files persist on disk after container restart, proving workspace durability"
