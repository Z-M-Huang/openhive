name: Agent-to-Agent Messaging
description: Verify send_message works between parent↔child and is blocked between siblings.
needs_api_key: false
needs_clean_start: false

setup:
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"

teardown: []

test_cases:
  - name: Org tree tracks parent-child relationships
    steps:
      - action: "Verify parent-child structure in SQLite"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); const r=D.prepare('SELECT name,parentId FROM org_tree').all(); console.log(JSON.stringify(r)); D.close()\""
        expected: "main"
    expected_outcome: "Org tree has parent-child relationships for messaging authorization"

  - name: Send_message validates parent-child relationship
    steps:
      - action: "Verify send_message tool exists in org MCP"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); console.log('DB accessible'); D.close()\""
        expected: "DB accessible"
    expected_outcome: "Messaging infrastructure is operational"
