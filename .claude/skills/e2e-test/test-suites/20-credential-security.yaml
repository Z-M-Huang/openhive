name: Credential Security & Redaction
description: Verify credentials are injected but redacted from output. Cross-team isolation.
needs_api_key: true
needs_clean_start: false

setup:
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Wait for health"

teardown: []

test_cases:
  - name: Credential values redacted from WS output
    steps:
      - action: "Check container logs for redacted credential patterns"
        command: "sudo docker logs deployments-openhive-1 2>&1 | grep -c 'REDACTED' || echo '0'"
        expected: ""
    expected_outcome: "Credential scrubber is active — values matching known patterns are replaced with [REDACTED]"

  - name: Team config.yaml not accessible via agent workspace
    steps:
      - action: "Verify config.yaml is NOT in additionalDirectories"
        command: "sudo docker exec deployments-openhive-1 node -e \"const {buildSessionContext}=require('./backend/dist/sessions/context-builder.js'); const ctx=buildSessionContext('main','/app/.run'); console.log(ctx.additionalDirectories.some(d=>d.endsWith('/main'))?'ROOT_EXPOSED':'ROOT_HIDDEN')\""
        expected: "ROOT_HIDDEN"
    expected_outcome: "Team root directory (containing config.yaml) is not in additionalDirectories"
