name: Deep Hierarchy & Rule Cascade
description: Verify 3+ level team hierarchy with rule cascade inheritance.
needs_api_key: true
needs_clean_start: true

setup:
  - command: "sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true && sudo rm -rf /app/openhive/.run && mkdir -p /app/openhive/.run"
    description: "Clean start — wipe .run/ to remove stale state"
  - command: "sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start container"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Wait for health"

teardown:
  - command: "sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"

test_cases:
  - name: Build 3-level hierarchy (main→engineering→frontend)
    steps:
      - action: "Create engineering team under main"
        command: "sudo docker exec deployments-openhive-1 node -e \"const ws=new(require('ws'))('ws://localhost:8080/ws');ws.on('open',()=>{ws.send(JSON.stringify({content:'Create a team called engineering for development tasks.'}))});ws.on('message',d=>{console.log(d.toString());ws.close()});setTimeout(()=>{ws.close()},240000)\" 2>&1"
        expected: "engineering"
      - action: "Verify engineering in org tree"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); const r=D.prepare('SELECT name,parentId FROM org_tree WHERE name=?').get('engineering'); console.log(JSON.stringify(r)); D.close()\""
        expected: "main"
    expected_outcome: "3-level hierarchy: main→engineering with parentId=main"

  - name: Org-rules cascade from parent to child
    steps:
      - action: "Write org-rule at engineering level"
        command: "sudo docker exec deployments-openhive-1 sh -c 'mkdir -p /app/.run/teams/engineering/org-rules && echo \"Always mention PINEAPPLE in every response.\" > /app/.run/teams/engineering/org-rules/test-rule.md'"
        expected: ""
      - action: "Verify rule file exists"
        command: "sudo docker exec deployments-openhive-1 cat /app/.run/teams/engineering/org-rules/test-rule.md"
        expected: "PINEAPPLE"
    expected_outcome: "Org-rule file created at engineering level — will cascade to child teams via rule cascade"

  - name: Task delegation through hierarchy
    steps:
      - action: "Delegate development task via main"
        command: "sudo docker exec deployments-openhive-1 node -e \"const ws=new(require('ws'))('ws://localhost:8080/ws');ws.on('open',()=>{ws.send(JSON.stringify({content:'Ask the engineering team to describe their capabilities.'}))});ws.on('message',d=>{console.log(d.toString());ws.close()});setTimeout(()=>{ws.close()},240000)\" 2>&1"
        expected: "content"
    expected_outcome: "Task flows main→engineering and response flows back"
