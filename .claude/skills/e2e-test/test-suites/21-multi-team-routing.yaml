name: Multi-Team Routing
description: Verify cross-team routing with two independent teams -- each team has its own container, tasks route to the correct team, tasks dispatched to team A do not appear in team B's list, containers operate independently (stopping one does not affect the other).

setup:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && bun run docker 2>&1 &"
    description: "Build the Docker image and start the server in the background"
  - command: "for i in $(seq 1 60); do curl -sf http://localhost:8080/api/health && exit 0; sleep 5; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 5 minutes for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Create two independent teams
    description: Create team-alpha and team-beta with separate containers
    steps:
      - action: "Create team-alpha via CLI"
        command: "echo 'Create a team called team-alpha for handling category A tasks' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Create team-beta via CLI"
        command: "echo 'Create a team called team-beta for handling category B tasks' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify both teams exist"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "teams"
    expected_outcome: "Both team-alpha and team-beta created with separate TIDs and containers"

  - name: Verify independent containers per team
    description: Each team has its own container visible in GET /api/containers
    steps:
      - action: "Query containers API"
        command: "curl -sf http://localhost:8080/api/containers 2>&1"
        expected: "containers"
    expected_outcome: "Containers API shows separate containers for each team"

  - name: Route task to team-alpha
    description: Task created with team_slug team-alpha routes to that team only
    steps:
      - action: "Create task for team-alpha via REST API"
        command: "curl -sf -X POST http://localhost:8080/api/tasks -H 'Content-Type: application/json' -d '{\"team_slug\": \"team-alpha\", \"title\": \"Alpha Task\", \"prompt\": \"Task for team alpha\"}' 2>&1"
        expected: "team-alpha"
      - action: "Verify task appears in team-alpha's tasks"
        command: "curl -sf 'http://localhost:8080/api/tasks?team=team-alpha' 2>&1"
        expected: "Alpha Task"
    expected_outcome: "Task created with team_slug 'team-alpha' and visible in team-alpha filtered list"

  - name: Task isolation between teams
    description: Tasks dispatched to team-alpha do not appear in team-beta's task list
    steps:
      - action: "Create task for team-beta"
        command: "curl -sf -X POST http://localhost:8080/api/tasks -H 'Content-Type: application/json' -d '{\"team_slug\": \"team-beta\", \"title\": \"Beta Task\", \"prompt\": \"Task for team beta\"}' 2>&1"
        expected: "team-beta"
      - action: "Verify team-beta tasks don't include team-alpha tasks"
        command: "curl -sf 'http://localhost:8080/api/tasks?team=team-beta' 2>&1"
        expected: "Beta Task"
      - action: "Verify team-alpha tasks don't include team-beta tasks"
        command: "curl -sf 'http://localhost:8080/api/tasks?team=team-alpha' 2>&1"
        expected: "Alpha Task"
    expected_outcome: "Each team's task list only contains its own tasks, not the other team's"

  - name: Independent container lifecycle
    description: Restarting one team's container does not affect the other team
    steps:
      - action: "Restart team-alpha container"
        command: "curl -sf -X POST http://localhost:8080/api/containers/team-alpha/restart 2>&1"
        expected: "restarted"
      - action: "Verify team-beta still healthy"
        command: "sleep 5 && curl -sf http://localhost:8080/api/containers 2>&1"
        expected: "containers"
    expected_outcome: "team-alpha container restarts independently, team-beta container remains unaffected"
