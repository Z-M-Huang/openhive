name: Multi-Team Scope Routing
description: Two teams with distinct scopes. Route queries via query_team, verify tool path executed.
needs_api_key: true
needs_clean_start: false

setup:
  - command: "echo '{\"content\":\"Create a team called math-ops for math calculations. It should accept math, calculation, and arithmetic topics.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
    description: "Create math-ops team"
  - command: "echo '{\"content\":\"Create a team called translate-ops for translations. It should accept translation, language, and spanish topics.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
    description: "Create translate-ops team"

teardown:
  - command: "echo '{\"content\":\"Shut down the math-ops team.\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1 || true"
    description: "Shut down math-ops"
  - command: "echo '{\"content\":\"Shut down the translate-ops team.\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1 || true"
    description: "Shut down translate-ops"

test_cases:
  - name: Math routes to math-ops
    steps:
      - action: "Query math-ops for multiplication"
        command: "echo '{\"content\":\"You MUST use query_team to ask math-ops: Do the math calculation of 247 multiplied by 38. Do NOT calculate this yourself.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
        expected: "9386"
      - action: "Verify query_team invoked for math-ops in logs"
        command: "sudo docker logs deployments-openhive-1 2>&1 | grep -c 'query_team\\|query:main:math-ops'"
        expected: "[1-9]"
    expected_outcome: "Math query routed to math-ops via query_team, correct answer returned"

  - name: Translation routes to translate-ops
    steps:
      - action: "Query translate-ops for Spanish translation"
        command: "echo '{\"content\":\"You MUST use query_team to ask translate-ops: Do a translation of Good morning, how are you? into the Spanish language. Do NOT translate this yourself.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
        expected: "buenos|buenas|hola|mañana"
      - action: "Verify query_team invoked for translate-ops in logs"
        command: "sudo docker logs deployments-openhive-1 2>&1 | grep -c 'query_team\\|query:main:translate-ops'"
        expected: "[1-9]"
    expected_outcome: "Translation query routed to translate-ops via query_team, Spanish response returned"

  - name: Cross-scope query rejected
    steps:
      - action: "Send translation task to math-ops (should reject)"
        command: "echo '{\"content\":\"Use query_team to ask math-ops: Translate hello to French.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
        expected: "scope|reject|not.*(accept|match)|outside|out-of-scope"
    expected_outcome: "Math-ops rejects translation task due to scope mismatch"
