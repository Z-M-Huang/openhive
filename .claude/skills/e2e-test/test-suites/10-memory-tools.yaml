name: Memory Tools
description: Verify save_memory and recall_memory MCP tools -- save curated and daily memory entries, recall memories by keyword query with limit, and confirm per-agent memory scoping per INV-07 (agent cannot recall another agent's memories).

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Save curated memory
    description: save_memory tool saves curated memory entry via CLI
    steps:
      - action: "Save curated memory via CLI"
        command: "echo 'Save this important information as curated memory: Project deadline is March 30th' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Memory saved successfully as curated type, assistant confirms save"

  - name: Save daily memory
    description: save_memory tool saves daily memory entry via CLI
    steps:
      - action: "Save daily memory via CLI"
        command: "echo 'Record today meeting notes as daily memory: discussed Q1 performance metrics' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Memory saved successfully as daily type, assistant confirms"

  - name: Recall memory by keyword
    description: recall_memory tool returns memories matching keyword query
    steps:
      - action: "Recall memories about project deadlines"
        command: "echo 'Recall any memories you have about project deadlines' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Returns memories matching 'deadline' keyword, includes the previously saved March 30th entry"

  - name: Verify per-agent memory scoping (INV-07)
    description: Create second agent and confirm it cannot access first agent's memories
    steps:
      - action: "Create a team with separate agents"
        command: "echo 'Create a team called memory-test with two agents: agent-alpha and agent-beta' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Save memory as one agent and try to recall as another"
        command: "echo 'Save secret data as memory for agent-alpha, then try to recall it as agent-beta' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Per-agent scoping enforced: agent-beta cannot access agent-alpha's memories (INV-07)"

  - name: Verify memory persistence
    description: Memories are persisted and survive recall after subsequent operations
    steps:
      - action: "Recall all memories to confirm they persist"
        command: "echo 'List all memories you have saved' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Previously saved memories are still retrievable, confirming dual-write persistence"

  - name: Append preserves prior curated content
    description: Saving a second curated memory does not overwrite the first -- both entries are present in MEMORY.md
    steps:
      - action: "Save first curated memory"
        command: "echo 'Save this as curated memory: CI pipeline uses GitHub Actions with 4 parallel runners' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Save second curated memory"
        command: "echo 'Save this as curated memory: Staging environment is deployed to us-west-2 region' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify both entries are present in the memory file"
        command: "cat $(find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -1) 2>&1"
        expected: "GitHub Actions"
    expected_outcome: "MEMORY.md contains both the CI pipeline entry and the staging environment entry, confirming append does not clobber prior curated content"

  - name: Curated vs daily file routing
    description: Curated and daily memories are written to separate files or sections, not mixed together
    steps:
      - action: "Save a curated memory"
        command: "echo 'Save this as curated memory: The SLA target is 99.95 percent uptime' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Save a daily memory"
        command: "echo 'Record as daily memory: Today we discussed load balancer tuning' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Check that memory files exist and content is routed correctly"
        command: "find /app/openhive/.run/workspace/memory -name '*.md' -exec echo '--- {} ---' \\; -exec cat {} \\; 2>&1"
        expected: "99.95"
    expected_outcome: "Curated memory (SLA target) is stored in MEMORY.md and daily memory (load balancer) is stored in a date-stamped daily file or separate section, confirming proper file routing"

  - name: 200-line cap enforcement
    description: Memory files do not exceed approximately 200 lines -- older entries are pruned or summarized
    steps:
      - action: "Rapidly save many memory entries to approach the cap"
        command: "for i in $(seq 1 25); do echo \"Save this as curated memory: Test entry number $i with padding text to fill lines for cap enforcement testing\" | timeout 300 bun run cli/index.ts 2>&1 | tail -1; done"
        expected: "[Assistant]"
      - action: "Check line count of the memory file"
        command: "wc -l $(find /app/openhive/.run/workspace/memory -name 'MEMORY.md' 2>/dev/null | head -1) 2>&1"
        expected: ""
    expected_outcome: "MEMORY.md line count stays at or below approximately 200 lines, confirming the cap is enforced by pruning or summarizing older entries"

  - name: recall_memory finds saved content via keyword
    description: recall_memory tool returns previously saved content when searched by a specific keyword
    steps:
      - action: "Save a memory with a distinctive keyword"
        command: "echo 'Save this as curated memory: The Kubernetes cluster uses Istio service mesh version 1.20' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Recall memory using the keyword"
        command: "echo 'Use recall_memory to search for memories about Istio' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "Istio"
    expected_outcome: "recall_memory returns the saved entry about Istio service mesh when queried by keyword, confirming keyword-based retrieval works"
