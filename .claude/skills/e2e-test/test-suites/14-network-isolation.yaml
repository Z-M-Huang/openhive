name: Network Isolation
description: Verify network isolation invariants -- INV-02 (all inter-container messages route through root WebSocket hub), INV-03 (no direct container-to-container communication, ICC disabled in docker-compose), INV-04 (only root container writes to SQLite database), INV-10 (tool calls proxied through root).

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"
  - command: "echo 'Create a team called network-test for testing network isolation' | timeout 300 bun run cli/index.ts 2>&1"
    description: "Create a team via CLI to have child containers for network testing"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: "INV-02: All messages through root WS hub"
    description: Inter-container messages route through root WebSocket hub, verified via log events
    steps:
      - action: "Send task to team and check routing logs"
        command: "echo 'Send a task to the network-test team to verify message routing' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Query log events for WebSocket hub activity"
        command: "curl -sf 'http://localhost:8080/api/logs?limit=50' 2>&1"
        expected: "entries"
    expected_outcome: "Log events show messages routed through root WS hub, not direct container-to-container"

  - name: "INV-03: No ICC (Docker network has enable_icc=false)"
    description: Docker network configuration has inter-container communication disabled
    steps:
      - action: "Inspect docker network for ICC setting"
        command: "docker network ls --format '{{.Name}}' 2>&1 | grep openhive | head -1 | xargs docker network inspect 2>&1 | grep -i icc"
        expected: "false"
    expected_outcome: "Docker network has enable_icc: false, preventing direct container-to-container communication"

  - name: "INV-04: Single SQLite writer (root only)"
    description: Only root container has SQLite database, non-root containers forward writes via WebSocket
    steps:
      - action: "Check that database file exists on root container path"
        command: "ls -la /app/openhive/.run/workspace/*.db 2>&1 || echo 'Database at workspace level'"
        expected: "db"
      - action: "Verify root container health shows dbStatus connected"
        command: "curl -sf http://localhost:8080/api/health 2>&1"
        expected: "dbStatus"
    expected_outcome: "SQLite database file exists only in root-accessible workspace, root health shows dbStatus: connected"

  - name: "INV-10: Tool calls proxied through root"
    description: Tool calls from non-root containers are validated and proxied through root
    steps:
      - action: "Trigger tool call from team agent and verify via logs"
        command: "echo 'Have the network-test team create a task using create_task tool' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Query logs for tool call events"
        command: "curl -sf 'http://localhost:8080/api/logs?limit=30' 2>&1"
        expected: "entries"
    expected_outcome: "Tool calls from child containers are proxied through root for validation (INV-10)"
