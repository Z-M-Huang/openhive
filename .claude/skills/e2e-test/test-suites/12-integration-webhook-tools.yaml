name: Integration and Webhook Tools
description: Verify integration lifecycle MCP tools (create_integration -> test_integration -> activate_integration) and register_webhook tool -- integration status transitions through proposed -> tested -> active, webhook creates endpoint at /api/v1/hooks/:path, POST to webhook routes task to target team.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"
  - command: "echo 'Create a team called webhook-test for testing integrations' | timeout 300 bun run cli/index.ts 2>&1"
    description: "Create a team via CLI to provide context for integration and webhook tests"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Create integration (proposed status)
    description: create_integration MCP tool creates integration with status 'proposed'
    steps:
      - action: "Create integration via CLI"
        command: "echo 'Create a GitHub integration for the webhook-test team' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify integration in API"
        command: "curl -sf http://localhost:8080/api/integrations 2>&1"
        expected: "integration"
    expected_outcome: "Integration created with status 'proposed' and visible in integrations API"

  - name: Test integration (tested status)
    description: test_integration MCP tool transitions integration to 'tested' status
    steps:
      - action: "Test integration via CLI"
        command: "echo 'Test the GitHub integration for webhook-test team' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify integration status updated"
        command: "curl -sf http://localhost:8080/api/integrations 2>&1"
        expected: "tested"
    expected_outcome: "Integration status updated to 'tested'"

  - name: Activate integration (active status)
    description: activate_integration MCP tool transitions integration to 'active' status
    steps:
      - action: "Activate integration via CLI"
        command: "echo 'Activate the GitHub integration for webhook-test team' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify integration active"
        command: "curl -sf http://localhost:8080/api/integrations 2>&1"
        expected: "active"
    expected_outcome: "Integration status updated to 'active'"

  - name: Register webhook endpoint
    description: register_webhook MCP tool creates dynamic endpoint at /api/v1/hooks/:path
    steps:
      - action: "Register webhook via CLI"
        command: "echo 'Register a webhook at path github-events for the webhook-test team' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify webhook listed"
        command: "curl -sf http://localhost:8080/api/v1/hooks 2>&1"
        expected: "webhook"
    expected_outcome: "Webhook registered and visible in GET /api/v1/hooks list"

  - name: Webhook POST triggers task creation
    description: POST to registered webhook endpoint creates a task for the target team
    steps:
      - action: "Send POST to webhook endpoint"
        command: "curl -sf -X POST http://localhost:8080/api/v1/hooks/github-events -H 'Content-Type: application/json' -d '{\"event\": \"push\", \"repo\": \"test-repo\"}' 2>&1"
        expected: "taskId"
      - action: "Verify task created for webhook-test team"
        command: "curl -sf 'http://localhost:8080/api/tasks?team=webhook-test' 2>&1"
        expected: "task"
    expected_outcome: "Webhook POST creates task with webhook payload as prompt, assigned to webhook-test team"
