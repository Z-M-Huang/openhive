name: Security and Credentials
description: Verify credential management -- set_credential encrypts value with AES-256-GCM before storage, get_credential decrypts and returns the plaintext, credentials are team-scoped, and stored credentials are not leaked via public API endpoints.

setup:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && bun run docker 2>&1 &"
    description: "Build the Docker image and start the server in the background"
  - command: "for i in $(seq 1 60); do curl -sf http://localhost:8080/api/health && exit 0; sleep 5; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 5 minutes for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Set credential via CLI (AES-256-GCM encrypted at rest)
    description: set_credential MCP tool stores encrypted credential for the main team
    steps:
      - action: "Store credential via CLI"
        command: "echo 'Store a credential named test-api-key with value supersecret123 for the main team' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Credential stored successfully, assistant confirms set_credential completed"

  - name: Get credential round-trip (decryption and retrieval)
    description: get_credential MCP tool retrieves and decrypts the credential, proving AES-256-GCM encryption/decryption works
    steps:
      - action: "Retrieve credential via CLI and verify the value is returned"
        command: "echo 'Retrieve the credential named test-api-key and tell me its value' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Credential value 'supersecret123' returned as plaintext after decryption, proving the store/retrieve round-trip works with AES-256-GCM"

  - name: Credential not leaked via health endpoint
    description: Verify that stored credentials do not appear in the health endpoint response
    steps:
      - action: "Query health endpoint and verify credential value is not present"
        command: "curl -sf http://localhost:8080/api/health 2>&1"
        expected: "status"
    expected_outcome: "Health endpoint returns standard health data without any credential values (no 'supersecret123' in response)"

  - name: Credential not leaked via integrations endpoint
    description: Verify that stored credentials do not appear in the integrations list API
    steps:
      - action: "Query integrations endpoint and verify credential value is not present"
        command: "curl -sf http://localhost:8080/api/integrations 2>&1"
        expected: "integrations"
    expected_outcome: "Integrations endpoint does not expose credential values in its response"

  - name: Credential persistence across operations
    description: Credentials persist and remain accessible after other operations
    steps:
      - action: "Perform an unrelated operation (list teams)"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "teams"
      - action: "Verify credential still accessible after other operations"
        command: "echo 'Retrieve the credential named test-api-key again to verify it persists' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Previously stored credential is still accessible after intervening operations, confirming database persistence with AES-256-GCM encryption"
