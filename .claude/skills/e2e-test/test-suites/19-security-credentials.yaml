name: Security and Credentials
description: Verify file-based credential management -- set_credential writes plaintext to .credentials/<key>.txt, get_credential reads the file, credentials are not leaked via public API endpoints, and path traversal is rejected.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Set credential via CLI (file-based storage)
    description: set_credential MCP tool writes plaintext credential to .credentials/<key>.txt
    steps:
      - action: "Store credential via CLI"
        command: "echo 'Store a credential named test-api-key with value supersecret123' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Credential stored successfully, assistant confirms set_credential completed"

  - name: Verify credential file exists on disk
    description: After set_credential, .credentials/test-api-key.txt should exist with the plaintext value
    steps:
      - action: "Check that the credential file was written to the workspace"
        command: "find /app/openhive/.run/workspace -path '*/.credentials/test-api-key.txt' 2>/dev/null | head -3"
        expected: "test-api-key.txt"
      - action: "Verify the file contains the expected plaintext value"
        command: "cat $(find /app/openhive/.run/workspace -path '*/.credentials/test-api-key.txt' 2>/dev/null | head -1) 2>&1"
        expected: "supersecret123"
    expected_outcome: "File .credentials/test-api-key.txt exists and contains the plaintext value 'supersecret123'"

  - name: Get credential round-trip (file read)
    description: get_credential MCP tool reads the credential file and returns the plaintext value
    steps:
      - action: "Retrieve credential via CLI and verify the value is returned"
        command: "echo 'Retrieve the credential named test-api-key and tell me its value' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Credential value 'supersecret123' returned from the file, proving the store/retrieve round-trip works"

  - name: Credential not leaked via health endpoint
    description: Verify that stored credentials do not appear in the health endpoint response
    steps:
      - action: "Query health endpoint and verify credential value is not present"
        command: "curl -sf http://localhost:8080/api/health 2>&1"
        expected: "status"
    expected_outcome: "Health endpoint returns standard health data without any credential values (no 'supersecret123' in response)"

  - name: Path traversal rejection
    description: set_credential and get_credential reject key names containing path traversal sequences
    steps:
      - action: "Attempt to store a credential with path traversal in the key name"
        command: "echo 'Store a credential named ../../../etc/passwd with value hacked' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
      - action: "Verify no file was written outside .credentials directory"
        command: "test -f /app/openhive/.run/workspace/.credentials/../../../etc/passwd && echo 'LEAK' || echo 'SAFE'"
        expected: "SAFE"
    expected_outcome: "Path traversal key is rejected or sanitized -- no file written outside the .credentials directory"

  - name: Credential persistence across operations
    description: Credentials persist and remain accessible after other operations
    steps:
      - action: "Perform an unrelated operation (list teams)"
        command: "curl -sf http://localhost:8080/api/teams 2>&1"
        expected: "teams"
      - action: "Verify credential still accessible after other operations"
        command: "echo 'Retrieve the credential named test-api-key again to verify it persists' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "Previously stored credential is still accessible after intervening operations, confirming file-based persistence"

  - name: Member cannot call spawn_container (RBAC)
    description: Verify that a member agent cannot invoke container management tools -- only main_assistant has access
    steps:
      - action: "Create a team and agent, then attempt spawn_container from agent context"
        command: "echo 'Create a team called rbac-test, then add a member agent called rbac-agent, then have rbac-agent try to call spawn_container' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "The member agent receives AccessDenied when attempting spawn_container -- only main_assistant role has container management tools"
