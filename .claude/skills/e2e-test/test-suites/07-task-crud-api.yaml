name: Task CRUD
description: Verify task lifecycle via REST API: create task, list with pagination and filters, get task details, update status, and get lifecycle events.

setup:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && sudo rm -rf .run/workspace && mkdir -p .run/workspace && sudo docker compose -f deployments/docker-compose.yml up -d 2>&1"
    description: "Start the server (image pre-built)"
  - command: "for i in $(seq 1 30); do curl -sf http://localhost:8080/api/health && exit 0; sleep 3; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 90s for the health check endpoint to respond (exits 1 on timeout)"
  - command: "echo 'Create a team called task-test for testing task operations' | timeout 300 bun run cli/index.ts 2>&1"
    description: "Create a test team via CLI for task context since POST /api/tasks requires an existing team_slug"

teardown:
  - command: "cd /app/openhive && sudo docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Create task with required fields
    description: POST /api/tasks with team_slug, title, prompt creates task in pending state and returns 201
    steps:
      - action: "Create task via REST API and verify pending status"
        command: "curl -sf -X POST http://localhost:8080/api/tasks -H 'Content-Type: application/json' -d '{\"team_slug\": \"task-test\", \"title\": \"Test Task 01\", \"prompt\": \"Analyze the given data\"}' 2>&1"
        expected: "\"status\":\"pending\""
    expected_outcome: "Task created with generated ID, status 'pending', team_slug set correctly"

  - name: List tasks with pagination
    description: GET /api/tasks returns paginated list with total, offset, limit
    steps:
      - action: "Create a few more tasks for pagination"
        command: "for i in 2 3 4 5; do curl -sf -X POST http://localhost:8080/api/tasks -H 'Content-Type: application/json' -d \"{\\\"team_slug\\\": \\\"task-test\\\", \\\"title\\\": \\\"Task $i\\\", \\\"prompt\\\": \\\"Pagination test $i\\\"}\" 2>&1; done"
        expected: "\"status\":\"pending\""
      - action: "Query tasks with limit and offset and verify pagination fields"
        command: "curl -sf 'http://localhost:8080/api/tasks?limit=2&offset=0' 2>&1"
        expected: "\"limit\":2"
    expected_outcome: "Tasks list returns paginated results with total count, offset, and limit fields"

  - name: Filter tasks by status
    description: GET /api/tasks?status=pending returns only pending tasks
    steps:
      - action: "Filter tasks by pending status and verify status value in results"
        command: "curl -sf 'http://localhost:8080/api/tasks?status=pending' 2>&1"
        expected: "\"status\":\"pending\""
    expected_outcome: "Only tasks with status 'pending' are returned"

  - name: Filter tasks by team
    description: GET /api/tasks?team=task-test returns only that team's tasks
    steps:
      - action: "Filter tasks by team slug"
        command: "curl -sf 'http://localhost:8080/api/tasks?team=task-test' 2>&1"
        expected: "task-test"
    expected_outcome: "Only tasks with team_slug 'task-test' are returned"

  - name: Get task details by ID
    description: GET /api/tasks/:id returns full task details including all fields
    steps:
      - action: "Get the first task ID and query its details, verify team_slug value"
        command: "TASK_ID=$(curl -sf 'http://localhost:8080/api/tasks?limit=1' 2>&1 | grep -o '\"id\":\"[^\"]*\"' | head -1 | cut -d'\"' -f4); curl -sf http://localhost:8080/api/tasks/$TASK_ID 2>&1"
        expected: "\"team_slug\":\"task-test\""
    expected_outcome: "Task detail returns id, parent_id, team_slug, agent_aid, title, status, prompt, result, error, blocked_by, priority, created_at, updated_at, completed_at"

  - name: Update task status via PATCH
    description: PATCH /api/tasks/:id with {status: 'active'} updates the task's status
    steps:
      - action: "Update task status to active and verify in response"
        command: "TASK_ID=$(curl -sf 'http://localhost:8080/api/tasks?limit=1' 2>&1 | grep -o '\"id\":\"[^\"]*\"' | head -1 | cut -d'\"' -f4); curl -sf -X PATCH http://localhost:8080/api/tasks/$TASK_ID -H 'Content-Type: application/json' -d '{\"status\": \"active\"}' 2>&1"
        expected: "\"status\":\"active\""
    expected_outcome: "Task status updated to 'active', updated_at timestamp changed"

  - name: Get task lifecycle events
    description: GET /api/tasks/:id/events returns lifecycle events for the task
    steps:
      - action: "Query task events"
        command: "TASK_ID=$(curl -sf 'http://localhost:8080/api/tasks?limit=1' 2>&1 | grep -o '\"id\":\"[^\"]*\"' | head -1 | cut -d'\"' -f4); curl -sf http://localhost:8080/api/tasks/$TASK_ID/events 2>&1"
        expected: "events"
    expected_outcome: "Events endpoint returns array showing state transition history for the task"
