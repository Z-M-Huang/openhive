name: Scheduled Task Pipeline
description: Cron trigger fires, task enqueued for team, team processes it, verified in DB.
needs_api_key: true
needs_clean_start: false

setup:
  - command: "echo '{\"content\":\"Create a team called sched-ops for scheduled tasks and automation. It should accept scheduled, ping, and automation topics.\"}' | timeout 300 websocat ws://localhost:8080/ws 2>&1"
    description: "Create sched-ops team"
  - command: "sudo docker exec deployments-openhive-1 bash -c 'cat > /app/.run/triggers.yaml << EOF\ntriggers:\n  - name: e2e-schedule-ping\n    type: schedule\n    config:\n      cron: \"* * * * *\"\n    team: sched-ops\n    task: \"Send a scheduled ping: Hello from scheduler\"\nEOF'"
    description: "Write triggers.yaml"
  - command: "sudo docker compose -f deployments/docker-compose.yml restart 2>&1 && for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Restart container and wait for health"
  - command: "sleep 75"
    description: "Wait 75 seconds for cron to fire"

teardown:
  - command: "sudo docker exec deployments-openhive-1 rm -f /app/.run/triggers.yaml 2>&1 || true"
    description: "Remove triggers.yaml"
  - command: "echo '{\"content\":\"Shut down the sched-ops team.\"}' | timeout 120 websocat ws://localhost:8080/ws 2>&1 || true"
    description: "Shut down sched-ops"
  - command: "sudo docker compose -f deployments/docker-compose.yml restart 2>&1 && for i in $(seq 1 30); do curl -sf http://localhost:8080/health >/dev/null 2>&1 && echo 'Ready' && break; sleep 3; done"
    description: "Restart to clear loaded triggers"

test_cases:
  - name: Triggers registered
    steps:
      - action: "Check health for registered triggers"
        command: "curl -sf http://localhost:8080/health 2>&1"
        expected: "registered"
    expected_outcome: "Health shows at least 1 registered trigger"

  - name: Task enqueued
    steps:
      - action: "Check task queue for sched-ops entries"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3');const d=new D('/app/.run/openhive.db');const r=d.prepare('SELECT COUNT(*) as c FROM task_queue WHERE team_id=?').get('sched-ops');console.log('count:'+r.c);d.close()\" 2>&1"
        expected: "count:[1-9]"
    expected_outcome: "At least 1 task enqueued for sched-ops"

  - name: Task processed
    steps:
      - action: "Check latest task status"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3');const d=new D('/app/.run/openhive.db');const r=d.prepare('SELECT status FROM task_queue WHERE team_id=? ORDER BY created_at DESC LIMIT 1').get('sched-ops');console.log(r?r.status:'none');d.close()\" 2>&1"
        expected: "completed|running"
    expected_outcome: "Latest task is completed or running"

  - name: Dedup working
    steps:
      - action: "Check total task count for dedup"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3');const d=new D('/app/.run/openhive.db');const r=d.prepare('SELECT COUNT(*) as c FROM task_queue WHERE team_id=?').get('sched-ops');console.log('count:'+r.c);d.close()\" 2>&1"
        expected: "count:[1-3]"
    expected_outcome: "Task count is 1-3 (not 7+), proving dedup works"
