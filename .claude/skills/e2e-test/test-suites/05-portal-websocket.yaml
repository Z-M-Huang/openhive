name: Portal WebSocket
description: Verify the /ws/portal WebSocket endpoint accepts connections, streams system events in real-time, and maintains connection with heartbeats.

setup:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && bun run docker 2>&1 &"
    description: "Build the Docker image and start the server in the background"
  - command: "for i in $(seq 1 60); do curl -sf http://localhost:8080/api/health && exit 0; sleep 5; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 5 minutes for the health check endpoint to respond (exits 1 on timeout)"

teardown:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: WebSocket upgrade accepted on /ws/portal
    description: Verify /ws/portal accepts WebSocket upgrade with HTTP 101 Switching Protocols
    steps:
      - action: "Send WebSocket upgrade request to /ws/portal using curl"
        command: "curl -sf -o /dev/null -w '%{http_code}' --header 'Connection: Upgrade' --header 'Upgrade: websocket' --header 'Sec-WebSocket-Version: 13' --header 'Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==' http://localhost:8080/ws/portal 2>&1"
        expected: "101"
    expected_outcome: "HTTP response status code 101 (Switching Protocols) confirming WebSocket upgrade"

  - name: Receive events via portal WebSocket
    description: Open a WebSocket connection via a bun script, create a team via REST API, and verify events are received on the WebSocket
    steps:
      - action: "Start an inline bun WebSocket listener in background, create a team, then check captured events"
        command: "bun -e \"const ws = new WebSocket('ws://localhost:8080/ws/portal'); const msgs=[]; ws.onmessage = (e) => msgs.push(e.data); ws.onopen = () => { setTimeout(() => { ws.close(); console.log('EVENTS:', msgs.join('|')); process.exit(0); }, 12000); }; ws.onerror = (e) => { console.log('ERROR:', e); process.exit(1); };\" > /tmp/ws-events.txt 2>&1 & WS_PID=$! && sleep 3 && curl -sf -X POST http://localhost:8080/api/teams -H 'Content-Type: application/json' -d '{\"slug\": \"portal-ws-test\"}' 2>&1 && sleep 10 && wait $WS_PID 2>/dev/null; cat /tmp/ws-events.txt 2>&1"
        expected: "EVENTS:"
    expected_outcome: "WebSocket listener captures events after team creation; output contains 'EVENTS:' prefix with captured messages"

  - name: WebSocket connection stays alive (keepalive)
    description: Verify WebSocket connection stays open for several seconds without server-side closure
    steps:
      - action: "Open a WebSocket connection and hold it for 8 seconds, verifying it stayed open the entire time"
        command: "bun -e \"const start = Date.now(); const ws = new WebSocket('ws://localhost:8080/ws/portal'); ws.onopen = () => { setTimeout(() => { const elapsed = Math.floor((Date.now() - start) / 1000); ws.close(); console.log('WS_OPEN_SECONDS:' + elapsed); process.exit(0); }, 8000); }; ws.onclose = (e) => { if (Date.now() - start < 7000) { console.log('WS_CLOSED_EARLY'); process.exit(1); } }; ws.onerror = () => { console.log('WS_ERROR'); process.exit(1); };\" 2>&1"
        expected: "WS_OPEN_SECONDS:"
    expected_outcome: "Connection remains open for 8 seconds without server-side closure, output shows 'WS_OPEN_SECONDS:8' (or similar)"

  - name: Multiple concurrent WebSocket connections accepted
    description: Verify portal accepts multiple simultaneous WebSocket connections
    steps:
      - action: "Open two concurrent WebSocket connections and verify both connect successfully"
        command: "bun -e \"let connected = 0; const check = () => { if (connected >= 2) { console.log('BOTH_CONNECTED'); process.exit(0); } }; const ws1 = new WebSocket('ws://localhost:8080/ws/portal'); const ws2 = new WebSocket('ws://localhost:8080/ws/portal'); ws1.onopen = () => { connected++; check(); }; ws2.onopen = () => { connected++; check(); }; ws1.onerror = () => { console.log('WS1_ERROR'); process.exit(1); }; ws2.onerror = () => { console.log('WS2_ERROR'); process.exit(1); }; setTimeout(() => { console.log('TIMEOUT:' + connected); process.exit(1); }, 10000);\" 2>&1"
        expected: "BOTH_CONNECTED"
    expected_outcome: "Both WebSocket connections are accepted and open successfully"
