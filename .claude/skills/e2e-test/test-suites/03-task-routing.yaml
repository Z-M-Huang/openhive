name: Task Routing
description: Verify task routing through a team hierarchy -- send a weather query that routes from main assistant through team lead to member agent and back to CLI.

setup:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean start -- remove all containers and volumes from any previous run"
  - command: "cd /app/openhive && bun run docker 2>&1 &"
    description: "Build the Docker image and start the server in the background"
  - command: "for i in $(seq 1 60); do curl -sf http://localhost:8080/api/health && exit 0; sleep 5; done; echo 'Health check timed out'; exit 1"
    description: "Wait up to 5 minutes for the health check endpoint to respond (exits 1 on timeout)"
  - command: "echo 'Create a team that can report the current temperature and weather with a given city' | timeout 300 bun run cli/index.ts 2>&1"
    description: "Create the weather team (shared setup prerequisite from suite 02)"

teardown:
  - command: "cd /app/openhive && docker compose -f deployments/docker-compose.yml down -v 2>&1 || true"
    description: "Clean up -- remove all containers and volumes"

test_cases:
  - name: Send weather query and receive response
    description: Send a weather request that should be routed through the team hierarchy and return a result
    steps:
      - action: "Send a weather question via CLI and capture the response"
        command: "echo 'What is the weather in Boca Raton?' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "[Assistant]"
    expected_outcome: "The CLI displays a response containing weather-related information about Boca Raton (temperature, conditions, forecast, or similar)"

  - name: Response contains weather-related content
    description: Verify the response actually addresses the weather query rather than being a generic reply
    steps:
      - action: "Examine the response captured in the previous case for weather-related terms"
        command: "echo 'What is the weather in Boca Raton?' | timeout 300 bun run cli/index.ts 2>&1"
        expected: "Boca Raton"
    expected_outcome: "The response mentions Boca Raton and includes weather-related content such as temperature, conditions, humidity, or forecast data"

  - name: Verify task was routed through team hierarchy
    description: Confirm the task flowed through the hierarchy by checking task records in the API
    steps:
      - action: "Query the tasks API to find tasks related to the weather query"
        command: "curl -sf 'http://localhost:8080/api/tasks?limit=20' 2>&1"
        expected: "task"
      - action: "Query task events to verify routing through multiple agents"
        command: "curl -sf 'http://localhost:8080/api/tasks?limit=20' 2>&1"
        expected: "completed"
    expected_outcome: "The tasks API shows task records indicating the query was dispatched from the main assistant to the team lead and then to a member agent, with status transitions visible in the task chain"
