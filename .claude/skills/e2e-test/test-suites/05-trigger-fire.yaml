name: Trigger Fire
description: Verify keyword triggers fire and create tasks when matching messages arrive.
needs_api_key: false
needs_clean_start: false

setup: []
teardown: []

test_cases:
  - name: Health shows triggers registered
    steps:
      - action: "Check trigger count in health"
        command: "curl -sf http://localhost:8080/health"
        expected: "triggers"
    expected_outcome: "Health endpoint includes triggers field"

  - name: Matching keyword fires trigger via WS
    steps:
      - action: "Send message matching keyword trigger"
        command: "echo '{\"content\":\"e2e-test-trigger\"}' | timeout 30 websocat ws://localhost:8080/ws 2>&1"
        expected: ""
      - action: "Verify task created in SQLite"
        command: "sudo docker exec deployments-openhive-1 node -e \"const D=require('better-sqlite3')('/app/.run/openhive.db',{readonly:true}); const r=D.prepare('SELECT COUNT(*) as c FROM task_queue WHERE team_id=?').get('test-team'); console.log('tasks:',r.c); D.close()\""
        expected: "tasks:"
    expected_outcome: "Keyword trigger fires and task is enqueued for test-team"
